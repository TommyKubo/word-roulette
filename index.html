<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワード ルーレット</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #00CC99; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: #00CC99; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
.title { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 1px; }
.tabs { display: flex; gap: 6px; }
.tab { padding: 7px 18px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.6); background: transparent; color: #fff; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.tab.active { background: #fff; color: #00AA80; font-weight: 600; border-color: #fff; }

.panel { display: none; flex: 1; }
.panel.active { display: flex; flex-direction: column; }

/* ルーレット */
.roulette-area { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.roulette-card { background: #fff; border-radius: 16px; width: 100%; max-width: 600px; padding: 40px 30px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; min-height: 260px; transition: transform 0.1s; position: relative; overflow: hidden; }
.roulette-card:active { transform: scale(0.98); }
.dragon-img { position: absolute; right: -10px; bottom: -10px; width: 140px; opacity: 0.18; pointer-events: none; }
.word-en { font-size: 54px; font-weight: 700; color: #222; line-height: 1.1; }
.word-ja { font-size: 30px; color: #555; font-weight: 400; }
.click-hint { font-size: 13px; color: #00AA80; font-weight: 500; margin-top: 8px; }

/* 編集 */
.editor-area { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.editor-box { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 16px; flex: 1; display: flex; flex-direction: column; }
.label { font-size: 13px; color: #fff; margin-bottom: 8px; line-height: 1.5; }
textarea { width: 100%; flex: 1; min-height: 200px; font-family: monospace; font-size: 13px; border: none; border-radius: 8px; padding: 10px 12px; resize: vertical; color: #222; background: #fff; }
textarea:focus { outline: 2px solid rgba(255,255,255,0.6); }
.btn-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.btn-white { padding: 8px 24px; border-radius: 20px; border: none; background: #fff; color: #00AA80; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-white:hover { background: #e8fff9; }
.count { font-size: 13px; color: rgba(255,255,255,0.8); }
.warn { font-size: 13px; color: #ffee55; font-weight: 600; display: none; }

/* URL生成 */
.share-area { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.share-box { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 16px; }
.url-output { background: #fff; border-radius: 8px; padding: 10px 12px; font-family: monospace; font-size: 11px; color: #444; word-break: break-all; display: none; margin-top: 10px; max-height: 100px; overflow-y: auto; }
.btn-outline { padding: 8px 20px; border-radius: 20px; border: 2px solid #fff; background: transparent; color: #fff; font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 8px; display: none; }
.btn-outline:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="title">ワード ルーレット</div>
  <div class="tabs" id="tab-bar">
    <button class="tab active" onclick="switchTab('roulette')">ルーレット</button>
    <button class="tab" onclick="switchTab('editor')">単語編集</button>
    <button class="tab" onclick="switchTab('share')">URL生成</button>
  </div>
</div>

<div id="tab-roulette" class="panel active">
  <div class="roulette-area">
    <div class="roulette-card" id="roulette-card">
      <div class="word-en" id="disp-en">soccer</div>
      <div class="word-ja" id="disp-ja">サッカー</div>
      <div class="click-hint">▲ タップ / クリックで次の単語へ</div>
      <img class="dragon-img" id="dragon-img" src="" alt="">
    </div>
  </div>
</div>

<div id="tab-editor" class="panel">
  <div class="editor-area">
    <div class="editor-box">
      <div class="label">英語・日本語の順に入力（コピー＆ペースト）してください　※上限150語</div>
      <textarea id="word-input" placeholder="soccer&#9;サッカー&#10;apple&#9;りんご&#10;dog&#9;犬" oninput="updateCount()"></textarea>
      <div class="btn-row">
        <button class="btn-white" onclick="applyWords()">適用する</button>
        <span class="count" id="wc">0 語</span>
        <span class="warn" id="warn">150語を超えています</span>
      </div>
    </div>
  </div>
</div>

<div id="tab-share" class="panel">
  <div class="share-area">
    <div class="share-box">
      <div class="label">現在の単語リストをURLに変換します。このURLを生徒に共有してください。</div>
      <div class="btn-row">
        <button class="btn-white" onclick="generateUrl()">URLを生成する</button>
      </div>
      <div class="url-output" id="url-box"></div>
      <button class="btn-outline" id="copy-btn" onclick="copyUrl()">📋 コピー</button>
    </div>
  </div>
</div>

pppplmmmmmmWaaaaaZZppppplmmmmmmWaaaaaZZpppptm33TIy/n8OMvctJnNgagAAAABJRU5ErkJggg==";

var isStudentMode = false;

var params = new URLSearchParams(location.search);
if (params.get('data')) {
  isStudentMode = true;
}

if (isStudentMode) {
  document.getElementById('tab-bar').style.display = 'none';
}

document.getElementById('dragon-img').src = 'data:image/png;base64,' + DRAGON_B64;

let words = [
  ['soccer','サッカー'],['apple','りんご'],['dog','犬'],['cat','ネコ'],
  ['banana','バナナ'],['elephant','ゾウ'],['tennis','テニス'],['pizza','ピザ'],
  ['strawberry','いちご'],['rabbit','ウサギ']
];
let queue = [];

if (isStudentMode) {
  try {
    var raw = params.get('data').replace(/-/g, '+').replace(/_/g, '/'); var decoded = decodeURIComponent(escape(atob(raw)));
    words = decoded.split('\n').map(function(l){ return l.split('\t'); }).filter(function(p){ return p.length >= 2; });
  } catch(e) {}
}

function switchTab(name) {
  var names = ['roulette','editor','share'];
  document.querySelectorAll('.tab').forEach(function(t,i){ t.classList.toggle('active', names[i] === name); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
}

function getNext() {
  if (queue.length === 0) {
    queue = [];
    for (var i = 0; i < words.length; i++) queue.push(i);
    for (var i = queue.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = queue[i]; queue[i] = queue[j]; queue[j] = tmp;
    }
  }
  return queue.pop();
}

function nextWord() {
  if (!words.length) return;
  var idx = getNext();
  document.getElementById('disp-en').textContent = words[idx][0];
  document.getElementById('disp-ja').textContent = words[idx][1];
}

document.getElementById('roulette-card').addEventListener('click', nextWord);

function applyWords() {
  var raw = document.getElementById('word-input').value.trim();
  if (!raw) return;
  var parsed = raw.split('\n').map(function(l){ return l.split('\t'); }).filter(function(p){ return p.length >= 2 && p[0].trim(); });
  if (!parsed.length) { alert('正しく読み取れませんでした。英語と日本語がタブ区切りか確認してください。'); return; }
  if (parsed.length > 150) { alert('150語を超えています。150語以内にしてください。'); return; }
  words = parsed.map(function(p){ return [p[0].trim(), p[1].trim()]; });
  queue = [];
  updateCount();
  alert(words.length + '語を読み込みました！');
  switchTab('roulette');
  nextWord();
}

function updateCount() {
  var raw = document.getElementById('word-input').value.trim();
  if (!raw) { document.getElementById('wc').textContent = '0 語'; document.getElementById('warn').style.display = 'none'; return; }
  var n = raw.split('\n').filter(function(l){ return l.includes('\t'); }).length;
  document.getElementById('wc').textContent = n + ' 語';
  document.getElementById('warn').style.display = n > 150 ? 'inline' : 'none';
}

function generateUrl() {
  var raw = document.getElementById('word-input').value.trim();
  if (!raw) { alert('単語がありません。単語編集タブで単語を入力してください。'); return; }
  var parsed = raw.split('\n').map(function(l){ return l.split('\t'); }).filter(function(p){ return p.length >= 2 && p[0].trim(); });
  if (!parsed.length) { alert('正しく読み取れませんでした。英語と日本語がタブ区切りか確認してください。'); return; }
  if (parsed.length > 150) { alert('150語を超えています。150語以内にしてください。'); return; }
  var data = parsed.map(function(p){ return p[0].trim() + '\t' + p[1].trim(); }).join('\n');
  var encoded = btoa(unescape(encodeURIComponent(data))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  var url = location.href.split('?')[0] + '?data=' + encoded;
  var box = document.getElementById('url-box');
  box.textContent = url;
  box.style.display = 'block';
  document.getElementById('copy-btn').style.display = 'inline-block';
}

function copyUrl() {
  var text = document.getElementById('url-box').textContent;
  navigator.clipboard.writeText(text).then(function(){
    var btn = document.getElementById('copy-btn');
    btn.textContent = '✅ コピーしました';
    setTimeout(function(){ btn.textContent = '📋 コピー'; }, 2000);
  });
}

nextWord();
</script>
